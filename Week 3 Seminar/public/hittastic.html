<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HitTastic!</title>
    <script type="module" src="index.js"></script>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #c0c0ff;
            color: black;
            margin: 20px;
        }

        #logodiv {
            text-align: center;
        }

        #htresults {
            border: 1px solid black;
            background-color: #e0e0ff;
            width: 70%;
            min-height: 200px;
            padding: 10px;
            overflow: auto;
            margin-top: 15px;
        }

        .song-card {
            border-bottom: 1px solid #999;
            padding: 10px 0;
        }

        .song-card button {
            margin-top: 6px;
        }

        .form-section {
            margin-top: 25px;
            padding: 10px;
            background-color: #dcdcff;
            width: 70%;
        }

        .form-section input {
            margin: 5px;
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="logodiv">
        <img src="images/hittastic.png" alt="HitTastic logo" width="220">
    </div>

    <h1>Welcome to HitTastic!</h1>

    <p>
        Search and shop for your favourite songs on HitTastic!
    </p>

    <div>
        <label for="theArtist">Artist:</label>
        <input id="theArtist" type="text">
        <button id="search">Search!</button>
    </div>

    <div id="htresults"></div>

    <div class="form-section">
        <h2>Add a New Song</h2>

        <div>
            <input id="newTitle" type="text" placeholder="Title">
            <input id="newArtist" type="text" placeholder="Artist">
            <input id="newYear" type="number" placeholder="Year">
            <input id="newDownloads" type="number" placeholder="Downloads">
            <input id="newPrice" type="number" step="0.01" placeholder="Price">
            <input id="newQuantity" type="number" placeholder="Quantity">
            <button id="addSong">Add Song</button>
        </div>
    </div>

    <div id="message"></div>
</body>
</html>
