<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Solent E-Stores</title>
  <script type="module" src="index.js"></script>
</head>
<body>
  <h1>🛒 Solent E-Stores</h1>

  <h2>Search Products (GET)</h2>
  <button id="loadProducts">Show All Products</button>
  <div id="results"></div>

  <hr />

  <h2>Add New Product (POST)</h2>
  <input id="name" placeholder="Product name" />
  <input id="manufacturer" placeholder="Manufacturer" />
  <input id="price" placeholder="Price" />
  <button id="addProduct">Add Product</button>

  <div id="message"></div>
</body>
</html>
